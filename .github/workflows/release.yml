name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          name="mmdbpatch_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          binary="mmdbpatch"
          if [ "$GOOS" = "windows" ]; then
            binary="mmdbpatch.exe"
          fi
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${binary}" \
            ./cmd/mmdbpatch
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip "${name}.zip" "${binary}")
          else
            (cd dist && tar -czf "${name}.tar.gz" "${binary}")
          fi

      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 \( -name "*.tar.gz" -o -name "*.zip" \) -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > "checksums_${{ matrix.goos }}_${{ matrix.goarch }}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmdbpatch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums_*.txt
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 \( -name "*.tar.gz" -o -name "*.zip" \) -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
